    <main class="container blog-container">
        <h1><a href="./" class="anchor">#</a> Blog</h1>
        <p class="md-font mb-4">Thoughts on software engineering, life in Taiwan, and everything in between.</p>

        <div id="blog-posts" class="blog-posts">
            <!-- Posts are loaded dynamically from posts.json -->
            <p class="loading-text">Loading posts...</p>
        </div>
    </main>

    <script>
        // Theme management (same as main site)
        const themeToggleBtn = document.querySelector("#themeToggleBtn");
        const lightThemeIcon = document.querySelector("#sunIcon");
        const darkThemeIcon = document.querySelector("#moonIcon");

        function updateTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            if (theme === "dark") {
                darkThemeIcon.style.display = "block";
                lightThemeIcon.style.display = "none";
                sunIcon.style.display = "block";
                moonIcon.style.display = "none";
            } else {
                darkThemeIcon.style.display = "none";
                lightThemeIcon.style.display = "block";
                sunIcon.style.display = "none";
                moonIcon.style.display = "block";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const currentTheme = localStorage.getItem("theme") || "light";
            updateTheme(currentTheme);
        });

        themeToggleBtn.addEventListener("click", () => {
            const theme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            updateTheme(theme);
        });

        function toggleMenu() {
            const navLink = document.querySelector(".nav-link");
            const menuIcon = document.querySelector("#menu-icon");
            navLink.classList.toggle("active");
            menuIcon.classList.toggle("active");
        }

        // Load and render blog posts
        async function loadPosts() {
            const container = document.getElementById("blog-posts");
            try {
                const response = await fetch("posts.json");
                if (!response.ok) throw new Error("Failed to load posts");
                const posts = await response.json();

                if (posts.length === 0) {
                    container.innerHTML = "<p>No posts yet. Check back soon!</p>";
                    return;
                }

                container.innerHTML = posts
                    .map(
                        (post) => `
                    <article class="blog-card">
                        <a href="post.html#${post.slug}" class="blog-card-link">
                            <div class="blog-card-content">
                                <time class="blog-card-date" datetime="${post.date}">${formatDate(post.date)}</time>
                                <h2 class="blog-card-title">${post.title}</h2>
                                <p class="blog-card-description">${post.description}</p>
                                <div class="blog-card-tags">
                                    ${post.tags.map((tag) => `<span class="tag">${tag}</span>`).join(" ")}
                                </div>
                            </div>
                        </a>
                    </article>
                `
                    )
                    .join("");
            } catch (err) {
                container.innerHTML =
                    '<p>Could not load posts. Run <code>npm run build:blog</code> to generate the posts manifest.</p>';
                console.error(err);
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const date = new Date(dateStr + "T00:00:00");
            return date.toLocaleDateString("en-US", {
                year: "numeric",
                month: "long",
                day: "numeric",
            });
        }

        loadPosts();
    </script>
