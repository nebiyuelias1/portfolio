<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16x16.png">
    <meta name="msapplication-TileColor" content="#060B1E">
    <meta name="theme-color" content="#060B1E">
    <title>Blog | Nebiyu Elias</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="blog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <!-- Waybar -->
    <div class="waybar">
        <div class="waybar-left">
            <span class="waybar-logo">&#9670;</span>
            <span class="waybar-workspace active">1</span>
            <span class="waybar-workspace">2</span>
            <span class="waybar-workspace">3</span>
            <span class="waybar-workspace">4</span>
            <span class="waybar-workspace">5</span>
        </div>
        <div class="waybar-center">
            <span id="waybarClock"></span>
        </div>
        <div class="waybar-right">
            <span class="waybar-module">&#9729; Taipei</span>
            <span class="waybar-module">&#9889; utf-8</span>
            <span class="waybar-module waybar-indicator">&#9679;</span>
        </div>
    </div>

    <div class="terminal-window">

        <!-- Tab Bar -->
        <nav class="tab-bar" id="tabBar">
            <div class="tab-links" id="tabLinks">
                <a href="../#home" data-section="home">
                    <span class="tab-icon">~</span> home
                </a>
                <a href="../#about" data-section="about">
                    <span class="tab-icon">i</span> about
                </a>
                <a href="../#projects" data-section="projects">
                    <span class="tab-icon">&gt;</span> projects
                </a>
                <a href="./" class="active-tab" data-section="blog">
                    <span class="tab-icon">#</span> blog
                </a>
                <a href="../#contact" data-section="contact">
                    <span class="tab-icon">@</span> contact
                </a>
            </div>
            <div id="menu-icon" class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <!-- Content -->
        <div class="terminal-body">
            <main class="container blog-container">
                <nav class="blog-back-link mb-2">
                    <a href="./">&larr; back to all posts</a>
                </nav>

                <article id="blog-post" class="blog-post">
                    <p class="loading-text">Loading post...</p>
                </article>
            </main>
        </div>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span class="status-bar-mode">NORMAL</span>
            <span id="postSlug" class="status-bar-file">blog/post</span>
            <div class="status-bar-right">
                <a href="./">&larr; all posts</a>
            </div>
        </footer>
    </div>

    <script>
        // Waybar clock
        (function () {
            var el = document.getElementById("waybarClock");
            function tick() {
                if (!el) return;
                var now = new Date();
                var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
                var h = now.getHours().toString().padStart(2, "0");
                var m = now.getMinutes().toString().padStart(2, "0");
                el.textContent = days[now.getDay()] + " " + h + ":" + m;
            }
            tick(); setInterval(tick, 15000);
        })();

        // Mobile menu toggle
        function toggleMenu() {
            var tabLinks = document.querySelector("#tabLinks");
            var menuIcon = document.querySelector("#menu-icon");
            if (tabLinks) tabLinks.classList.toggle("active");
            if (menuIcon) menuIcon.classList.toggle("active");
        }

        // Parse frontmatter
        function parseFrontmatter(raw) {
            var match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
            if (!match) return { meta: {}, content: raw };

            var frontmatter = match[1];
            var content = match[2];
            var meta = {};

            frontmatter.split("\n").forEach(function (line) {
                var colonIdx = line.indexOf(":");
                if (colonIdx === -1) return;
                var key = line.slice(0, colonIdx).trim();
                var value = line.slice(colonIdx + 1).trim();
                if (key === "tags") {
                    meta[key] = [];
                    return;
                }
                meta[key] = value;
            });

            var tagMatches = frontmatter.match(/tags:\n((?:\s+-\s+.+\n?)*)/);
            if (tagMatches) {
                meta.tags = tagMatches[1]
                    .split("\n")
                    .map(function (l) { return l.replace(/^\s+-\s+/, "").trim(); })
                    .filter(Boolean);
            }

            return { meta: meta, content: content };
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            var date = new Date(dateStr + "T00:00:00");
            return date.toLocaleDateString("en-US", {
                year: "numeric",
                month: "long",
                day: "numeric",
            });
        }

        // Load and render post
        async function loadPost() {
            var container = document.getElementById("blog-post");
            var slug = window.location.hash.slice(1);
            var postSlugEl = document.getElementById("postSlug");

            if (!slug) {
                container.innerHTML = '<p style="color: var(--term-fg-dim);">Post not found. <a href="./">Go back to all posts.</a></p>';
                return;
            }

            if (postSlugEl) postSlugEl.textContent = "blog/" + slug;

            try {
                var response = await fetch("posts/" + slug + ".md");
                if (!response.ok) throw new Error("Post not found");
                var raw = await response.text();
                var parsed = parseFrontmatter(raw);
                var meta = parsed.meta;
                var content = parsed.content;

                if (meta.title) {
                    document.title = meta.title + " | Nebiyu Elias";
                }

                var headerHtml = '<header class="blog-post-header">';
                if (meta.date) headerHtml += '<time class="blog-post-date" datetime="' + meta.date + '">' + formatDate(meta.date) + '</time>';
                if (meta.title) headerHtml += '<h1 class="blog-post-title">' + meta.title + '</h1>';
                if (meta.description) headerHtml += '<p class="blog-post-description">' + meta.description + '</p>';
                if (meta.tags && meta.tags.length) {
                    headerHtml += '<div class="blog-card-tags">' + meta.tags.map(function (t) { return '<span class="tag">' + t + '</span>'; }).join(" ") + '</div>';
                }
                headerHtml += '</header><hr class="blog-post-divider">';

                var bodyHtml = marked.parse(content);
                container.innerHTML = headerHtml + '<div class="blog-post-body">' + bodyHtml + '</div>';
            } catch (err) {
                container.innerHTML = '<p style="color: var(--term-fg-dim);">Could not load post. <a href="./">Go back to all posts.</a></p>';
                console.error(err);
            }
        }

        loadPost();
    </script>
</body>

</html>
